name: Build & Release PočasíMeteo Card

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Chart.js
        run: |
          mkdir -p src/vendor
          curl -L https://cdn.jsdelivr.net/npm/chart.js@latest/dist/chart.umd.js -o src/vendor/chart.js

      - name: Build
        run: npm run build

      - name: Create Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocasimeteo-card
          path: dist/pocasimeteo-card.js

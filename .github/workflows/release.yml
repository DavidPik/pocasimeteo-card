name: Build & Release PočasíMeteo Card

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (např. v1.0.0)"
        required: true
      release_name:
        description: "Název release (např. PočasíMeteo Card 1.0.0)"
        required: true
      release_notes:
        description: "Poznámky k release"
        required: false
        default: ""

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build card
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/pocasimeteo-card.js" ]; then
            echo "ERROR: dist/pocasimeteo-card.js not found!"
            exit 1
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            dist/pocasimeteo-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

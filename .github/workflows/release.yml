name: Build & Release PočasíMeteo Card

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release (např. v6.0.1)"
        required: true
      name:
        description: "Název release"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync version to package.json
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          jq ".version = \"$VERSION\"" package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Download Chart.js
        run: |
          mkdir -p src/vendor
          curl -L https://cdn.jsdelivr.net/npm/chart.js@latest/dist/chart.umd.js -o src/vendor/chart.js

      - name: Build
        run: npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.name }}
          files: dist/pocasimeteo-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

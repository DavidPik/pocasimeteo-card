name: Build & Release PočasíMeteo Card

on:
  workflow_dispatch:
    inputs:
      oznaceni_verze:
        description: "Označení verze (např. 6.0.56)"
        required: true
      release_notes:
        description: "Release notes"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare version variables
        id: vars
        run: |
          VERSION="${{ github.event.inputs.oznaceni_verze }}"
          TAG="v${VERSION}"
          NAME="Počasí Meteo Card – ${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Sync version to package.json
        run: |
          jq ".version = \"${{ steps.vars.outputs.version }}\"" package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Commit updated package.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json
          git commit -m "Update version to ${{ steps.vars.outputs.tag }}" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Download Chart.js + adapter
        run: |
          mkdir -p src/vendor
          curl -L https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.esm.js -o src/vendor/chart.js
          curl -L https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.esm.js -o src/vendor/chartjs-adapter-date-fns.js

      - name: Build
        run: npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          body: ${{ github.event.inputs.release_notes }}
          files: dist/pocasimeteo-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
